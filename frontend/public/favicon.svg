<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Supply chain: 3 nodes connected by lines -->
  <!-- Left node (supplier) -->
  <rect x="4" y="24" width="14" height="14" rx="3" fill="#3b82f6"/>
  <!-- Center node (hub) -->
  <rect x="25" y="20" width="14" height="22" rx="3" fill="#60a5fa"/>
  <!-- Right node (delivery) -->
  <rect x="46" y="24" width="14" height="14" rx="3" fill="#3b82f6"/>

  <!-- Connector lines -->
  <line x1="18" y1="31" x2="25" y2="31" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="39" y1="31" x2="46" y2="31" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrow heads right -->
  <polyline points="22,28 25,31 22,34" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="43,28 46,31 43,34" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "M" letter inside center node -->
  <text x="32" y="34" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="13" fill="white">M</text>
</svg>
